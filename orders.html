        <section class="orders-wrap">
          <h1>주문조회</h1>
          <p>WISH LIST에 담은 상품을 주문조회 형태로 확인할 수 있습니다.</p>

          <div id="wishOrderList" class="wish-order-list"></div>
        </section>
        <footer class="footer">
          <div class="footer__inner">
            <div><b>MUJINSA</b><br />주문조회 페이지</div>
          </div>
        </footer>
      </main>
    </div>
    <script type="module">
      import { getWishList, formatKRW } from "./utils.js";

      const listEl = document.getElementById("wishOrderList");
      const wishlist = getWishList();

      if (!wishlist.length) {
        listEl.innerHTML = `
          <div class="empty-box">
            <strong>아직 WISH LIST에 담긴 상품이 없습니다.</strong>
            <p>상품 상세페이지에서 WISH LIST 버튼을 눌러 상품을 담아보세요.</p>
            <a class="btn" href="./index.html">상품 보러가기</a>
          </div>
        `;
      } else {
        listEl.innerHTML = wishlist
          .map(
            (p) => `
            <article class="wish-order-card">
              <img src="${p.thumbnailUrl}" alt="${p.name}">
              <div>
                <div class="wish-order-brand">${p.brand}</div>
                <h2>${p.name}</h2>
                <p>
                  <strong>${formatKRW(p.salePrice)}</strong>
                  <span>${p.discountRate}% 할인</span>
                </p>
                <a class="btn btn--ghost" href="./product.html?id=${encodeURIComponent(p.id)}">
                  상품 상세보기
                </a>
              </div>
            </article>
          `,
          )
          .join("");
      }
    </script>
  </body>
