<!doctype html>
<html lang="ko">
  <head>

          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-MWB3RTRK");
    </script>
    <!-- End Google Tag Manager -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MUJINSA SIGNUP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-MWB3RTRK"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div id="app">
      <main>
        <header class="header" id="siteHeader">
          <div class="header__top">
            <a class="brand" href="./index.html" id="gnbHome">
              <div class="brand__logo">MUJINSA</div>
              <div class="brand__sub">signup</div>
            </a>
            <nav class="gnb" aria-label="GNB">
              <div class="gnb__links">
                <a href="./signup.html" id="gnbSignup">회원가입</a>
                <a href="./login.html" id="gnbLogin">로그인</a>
                <a href="./orders.html" id="gnbOrders">주문조회</a>
                <a href="./recent.html" id="gnbRecent">최근본상품</a>
                <a href="./help.html" id="gnbHelp">고객센터</a>
              </div>
              <div class="gnb__icons">
                <a
                  class="icon-btn"
                  href="./search.html"
                  aria-label="검색"
                  id="btnSearchStatic"
                >
                  <svg
                    class="icon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="M20 20l-3.5-3.5"></path>
                  </svg>
                </a>
                <a class="icon-btn" href="./login.html" aria-label="계정">
                  <svg
                    class="icon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M20 21a8 8 0 0 0-16 0"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                  </svg>
                </a>
                <a class="icon-btn" href="./cart.html" aria-label="장바구니">
                  <svg
                    class="icon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M6 6h15l-1.5 9h-12z"></path>
                    <path d="M6 6l-2-3H1"></path>
                    <circle cx="9" cy="20" r="1"></circle>
                    <circle cx="18" cy="20" r="1"></circle>
                  </svg>
                </a>
              </div>
            </nav>
          </div>
        </header>
        <div
          class="card"
          style="margin: 16px 0; border: none; box-shadow: none"
        >
          <div
            style="
              display: grid;
              gap: 10px;
              max-width: 520px;
              margin: 0 auto;
              padding-top: 32px;
            "
          >
            <label>
              <div class="label">이메일</div>
              <input
                id="signup_email"
                class="input"
                type="email"
                placeholder="example@domain.com"
              />
            </label>
            <label>
              <div class="label">비밀번호</div>
              <input
                id="signup_pw"
                class="input"
                type="password"
                placeholder="••••••••"
              />
            </label>
            <label>
              <div class="label">이름</div>
              <input
                id="signup_name"
                class="input"
                type="text"
                placeholder="홍길동"
              />
            </label>
            <button
              id="btn_signup_submit"
              class="btn btn--dark"
              type="button"
              data-gtm="click"
              data-event="sign_up"
            >
              회원가입
            </button>
            <p class="helper"></p>
          </div>
        </div>

        <!-- <div style="height: 1000px"></div> -->
        <!-- <a class="btn" href="./index.html">메인으로</a> -->
        <footer class="footer">
          <div class="footer__inner">
            <div><b>MUJINSA</b><br />회원가입 페이지</div>
          </div>
        </footer>
      </main>
    </div>

    <script type="module">
      import { mountTopNotice } from "./partials.js";
      mountTopNotice();
    </script>
  </body>
</html>
