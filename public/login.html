<!doctype html>
<html lang="ko">
  <head>
    <!-- Google Tag Manager -->
    <script>
      (function (w, d, s, l, i) {
        w[l] = w[l] || [];
        w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-MWB3RTRK");
    </script>
    <!-- End Google Tag Manager -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MUJINSA LOGIN</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-MWB3RTRK"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div id="app">
      <main>
        <header class="header" id="siteHeader">
          <div class="header__top">
            <a class="brand" href="./index.html" id="gnbHome">
              <div class="brand__logo">MUJINSA</div>
              <div class="brand__sub">login</div>
            </a>
            <nav class="gnb" aria-label="GNB">
              <div class="gnb__links">
                <a href="./signup.html" id="gnbSignup">회원가입</a>
                <a href="./login.html" id="gnbLogin">로그인</a>
                <a href="./orders.html" id="gnbOrders">주문조회</a>
                <a href="./recent.html" id="gnbRecent">최근본상품</a>
                <a href="./help.html" id="gnbHelp">고객센터</a>
              </div>
              <div class="gnb__icons">
                <a
                  class="icon-btn"
                  href="./search.html"
                  aria-label="검색"
                  id="btnSearchStatic"
                >
                  <svg
                    class="icon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="M20 20l-3.5-3.5"></path>
                  </svg>
                </a>
                <a class="icon-btn" href="./login.html" aria-label="계정">
                  <svg
                    class="icon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M20 21a8 8 0 0 0-16 0"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                  </svg>
                </a>
                <a class="icon-btn" href="./cart.html" aria-label="장바구니">
                  <svg
                    class="icon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M6 6h15l-1.5 9h-12z"></path>
                    <path d="M6 6l-2-3H1"></path>
                    <circle cx="9" cy="20" r="1"></circle>
                    <circle cx="18" cy="20" r="1"></circle>
                  </svg>
                </a>
              </div>
            </nav>
          </div>
        </header>

        <div class="auth-wrap">
          <h1 class="auth-title">로그인</h1>
          <div class="auth-box">
            <div class="form-row">
              <label for="email">아이디</label>
              <input
                id="email"
                type="text"
                placeholder="아이디"
                autocomplete="username"
              />
            </div>
            <div class="form-row">
              <label for="pw">비밀번호</label>
              <input
                id="pw"
                type="password"
                placeholder="비밀번호"
                autocomplete="current-password"
              />
            </div>

            <div class="auth-actions">
              <!-- Required 3 buttons -->
              <button
                class="btn btn--wide"
                id="loginBtn"
                data-event="login_click"
              >
                로그인
              </button>
              <button
                class="btn btn--ghost btn--wide"
                id="guestBuyBtn"
                data-event="guest_buy"
              >
                비회원 구매
              </button>
              <button
                class="btn btn--ghost btn--wide"
                id="signupBtn"
                onclick="location.href = './signup.html'"
                data-event="signup_click"
              >
                회원가입
              </button>
            </div>

            <div class="helper-links">
              <a href="#" id="findId" data-event="find_id">아이디 찾기</a>
              <a href="#" id="findPw" data-event="find_pw">비밀번호 찾기</a>
            </div>

            <div
              style="
                margin-top: 26px;
                border-top: 1px solid #e8e8e8;
                padding-top: 18px;
                text-align: center;
              "
            >
              <div style="font-weight: 900; font-size: 18px">
                아직 회원이 아니신가요?
              </div>
              <div
                style="
                  color: #666;
                  font-size: 13px;
                  margin-top: 8px;
                  line-height: 1.6;
                "
              >
                지금 회원가입을 하시면 다양한 혜택을 받으실 수 있습니다.
              </div>
              <div style="margin-top: 14px">
                <a
                  class="btn btn--ghost"
                  href="./signup.html"
                  id="signupCta"
                  data-event="signup_cta"
                  >회원가입</a
                >
              </div>
            </div>
          </div>
        </div>

        <footer class="footer">
          <div class="footer__inner">
            <div><b>MUJINSA</b><br />로그인 페이지</div>
          </div>
        </footer>
      </main>
    </div>

    <script>
      window.dataLayer = window.dataLayer || [];
      function track(event, params) {
        window.dataLayer.push({ event, ...params });
      }

      document
        .getElementById("loginBtn")
        .addEventListener("click", () =>
          track("login_click", { method: "form" }),
        );
      document
        .getElementById("guestBuyBtn")
        .addEventListener("click", () => track("guest_buy", {}));
    </script>
  </body>
</html>
