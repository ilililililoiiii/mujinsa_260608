<!doctype html>
<html lang="ko">
  <head>
    <!-- Meta Pixel Code -->
    <script>
      !(function (f, b, e, v, n, t, s) {
        if (f.fbq) return;
        n = f.fbq = function () {
          n.callMethod
            ? n.callMethod.apply(n, arguments)
            : n.queue.push(arguments);
        };
        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = !0;
        n.version = "2.0";
        n.queue = [];
        t = b.createElement(e);
        t.async = !0;
        t.src = v;
        s = b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t, s);
      })(
        window,
        document,
        "script",
        "https://connect.facebook.net/en_US/fbevents.js",
      );
      fbq("init", "821784224015295");
      fbq("track", "PageView");
    </script>
    <noscript
      ><img
        height="1"
        width="1"
        style="display: none"
        src="https://www.facebook.com/tr?id=821784224015295&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MUJINSA HOME</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="home">
    <div id="app">
      <main class="container">
        <section class="rolling-banner" aria-label="프로모션 배너">
          <div class="rolling-banner__viewport">
            <div class="rolling-banner__track">
              <div class="rolling-banner__slide">
                <img src="./images/banner01.png" alt="여름 세일 배너" />
              </div>
              <div class="rolling-banner__slide">
                <img src="./images/banner02.png" alt="신상품 배너" />
              </div>
              <div class="rolling-banner__slide">
                <img src="./images/banner03.png" alt="이벤트 배너" />
              </div>
            </div>
          </div>
        </section>

        <div class="section-title">
          <div>
            <h1 id="pageTitle">추천 상품</h1>
            <p id="pageDesc">—</p>
          </div>
          <div style="text-align: right">
            <div style="font-size: 12px; color: #666">WISH LIST</div>
            <div style="font-weight: 900; font-size: 18px" id="wishCount">
              0
            </div>
          </div>
        </div>

        <section id="recentlyViewed" style="margin-bottom: 20px"></section>

        <div class="toolbar" aria-label="상품 필터/정렬">
          <div class="toolbar__left">
            <input
              class="input"
              id="filterQuery"
              placeholder="브랜드/상품명/태그로 검색"
              aria-label="상품명 검색"
            />
            <select
              class="select"
              id="filterCategory"
              aria-label="카테고리"
            ></select>
            <select class="select" id="sortBy" aria-label="정렬">
              <option value="recommend">추천순</option>
              <option value="review">리뷰많은순</option>
              <option value="rating">평점높은순</option>
              <option value="discount">할인높은순</option>
              <option value="priceAsc">가격낮은순</option>
              <option value="priceDesc">가격높은순</option>
            </select>
            <input
              class="select"
              id="minPrice"
              type="number"
              placeholder="최소가격"
              aria-label="최소가격"
            />
            <input
              class="select"
              id="maxPrice"
              type="number"
              placeholder="최대가격"
              aria-label="최대가격"
            />
            <button
              class="btn btn--ghost"
              id="btnApply"
              data-event="filter_apply_btn"
            >
              적용
            </button>
          </div>

          <div class="toolbar__right">
            <span id="countText" style="font-size: 13px; color: #666"></span>
            <select class="select" id="pageSize" aria-label="표시 개수">
              <option value="24">24개</option>
              <option value="48">48개</option>
              <option value="72">72개</option>
            </select>
          </div>
        </div>

        <section
          class="grid"
          id="productGrid"
          aria-label="상품 리스트"
        ></section>

        <div style="display: flex; justify-content: center; margin: 26px 0">
          <button class="btn" id="loadMore" data-event="load_more">
            더 보기
          </button>
        </div>
      </main>
    </div>

    <script type="module">
      import { getWishList } from "./utils.js";
      const el = document.getElementById("wishCount");
      const render = () => {
        el.textContent = String(getWishList().length);
      };
      render();
      window.addEventListener("storage", render);
      import { mountGnbToggle } from "./partials.js";
      mountGnbToggle();
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
